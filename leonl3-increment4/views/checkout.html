<!DOCTYPE html>
<head>
  <meta name="author" content="Leon Liu">
  <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
  <meta name="description" content="MonoMuse website redesign project">
  <title>Checkout | MonoMuse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../static/style.css">
  <script src="../static/script.js" defer></script>
</head>
<body onload="addYear()">
  <div class="container">
    <header class="header">
      <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
    </header>

    <nav class="nav_bar">
      <a href="../index.html">Home</a>
      <a href="explore.html">Explore</a>
      <a href="exhibitions.html">Exhibitions</a>
      <a href="buytickets.html">Buy Tickets</a>
    </nav>

    <main class="main">
      <h1>Checkout</h1>

      <p>Complete the form below to purchase your tickets. All fields are required.</p>

      <form action="#" method="post">
        <div>
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" placeholder="Your full name" required>
        </div>

        <div>
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <div>
          <label for="quantity">Ticket Quantity:</label>
          <input type="number" id="quantity" name="quantity" min="1" max="20" placeholder="1" required>
        </div>

        <div>
          <button type="submit">Submit Order</button>
        </div>
      </form>
    </main>

    <footer class="footer">
      <p id="copyYear"></p>
    </footer>
  </div>
</body>
</html>
