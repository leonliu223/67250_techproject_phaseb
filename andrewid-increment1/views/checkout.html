<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Leon Liu">
  <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
  <meta name="description" content="MonoMuse website redesign project">
  <title>Checkout | MonoMuse</title>
</head>
<body>
  <header>
    <h1>MonoMuse</h1>
    <nav>
      <a href="../index.html">Home</a>
      <a href="explore.html">Explore</a>
      <a href="exhibitions.html">Exhibitions</a>
      <a href="tickets.html">Buy Tickets</a>
      <a href="checkout.html">Checkout</a>
    </nav>
  </header>

  <div class="main">
    <h1>Checkout</h1>

    <p>Complete the form below to purchase your tickets. All fields are required.</p>

    <form action="#" method="post">
      <div>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Your full name" required>
      </div>

      <div>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>

      <div>
        <label for="quantity">Ticket Quantity:</label>
        <input type="number" id="quantity" name="quantity" min="1" max="20" placeholder="1" required>
      </div>

      <div>
        <button type="submit">Submit Order</button>
      </div>
    </form>
  </div>

  <footer>
    <p>&copy; 2026 MonoMuse. All rights reserved.</p>
  </footer>
</body>
</html>
